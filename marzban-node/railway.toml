# Railway configuration for Marzban-node (REST + TLS)
# This node runs INSIDE the same container as the Marzban panel (see start.sh),
# bound to 127.0.0.1. The panel reaches it as an "internal proxy" over loopback,
# so no public port is exposed for the node.

[build]
builder = "dockerfile"
dockerfilePath = "marzban-node/Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
# The node listens on loopback only; the panel connects via 127.0.0.1.
SERVICE_HOST = "127.0.0.1"
SERVICE_PROTOCOL = "rest"
SERVICE_TLS = "true"

XRAY_EXECUTABLE_PATH = "/usr/local/bin/xray"
XRAY_ASSETS_PATH = "/usr/local/share/xray"

SSL_DIR = "/var/lib/marzban-node"
SSL_CERT_FILE = "/var/lib/marzban-node/ssl_cert.pem"
SSL_KEY_FILE = "/var/lib/marzban-node/ssl_key.pem"
# Same cert as the server cert: the panel presents this exact cert as its
# client cert, which satisfies mutual-TLS with no manual exchange.
SSL_CLIENT_CERT_FILE = "/var/lib/marzban-node/ssl_cert.pem"
